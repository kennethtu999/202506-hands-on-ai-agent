
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測試頁面</title>
    <!-- 引入 CDN CSS (例如：Bootstrap) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
            color: #343a40;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
        }
        h1 {
            color: #007bff;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>您好！這是一個測試頁面。</h1>
        <p class="lead">感謝您的輸入。</p>
        <!-- 引入 CDN 圖片 (例如：Placeholder.com) -->
        <img src="https://via.placeholder.com/150/007bff/FFFFFF?text=Hello" alt="測試圖片" class="img-fluid rounded mt-3">
    </div>

    <!-- 引入 CDN JavaScript (例如：Bootstrap Bundle) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 你可以在這裡加入一些 JavaScript 邏輯
        console.log("頁面已成功載入！");
    </script>
</body>
</html>
