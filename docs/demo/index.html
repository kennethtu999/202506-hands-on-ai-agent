<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美麗前端展示頁</title>
    <!-- 引入 Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #343a40;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; /* Add some padding for smaller screens */
            box-sizing: border-box; /* Include padding in element's total width and height */
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 800px;
            width: 100%; /* Ensure it takes full width on small screens */
        }
        h1 {
            color: #007bff;
            margin-bottom: 20px;
            font-weight: 700;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .hero-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        .btn-custom {
            background-color: #28a745;
            border-color: #28a745;
            color: white;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 30px;
            transition: all 0.3s ease;
            text-decoration: none; /* Remove underline for anchor if used as button */
            display: inline-block; /* Allow padding and margin */
        }
        .btn-custom:hover {
            background-color: #218838;
            border-color: #1e7e34;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>歡迎來到我們的美麗世界</h1>
        <p>這是一個利用 CDN 資源快速搭建的單頁式網站，旨在展示前端工程師的設計美學與實用技巧。我們注重每個細節，讓使用者體驗更加流暢與愉悅。</p>
        <!-- 引入 CDN 圖片 -->
        <img src="https://picsum.photos/800/450" alt="美麗風景" class="hero-image">
        <p>探索更多關於我們的工作與理念，期待為您帶來更多驚喜！</p>
        <button type="button" class="btn btn-custom" onclick="alert('您點擊了按鈕！')">點擊探索</button>
    </div>

    <!-- 引入 Bootstrap JS Bundle CDN (Popper and Bootstrap JS) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
