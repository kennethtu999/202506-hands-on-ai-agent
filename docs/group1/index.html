<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的單頁式網站</title>
    <!-- 引入 Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 40px auto;
        }
        h1 {
            color: #0056b3;
            margin-bottom: 20px;
        }
        p {
            line-height: 1.6;
            margin-bottom: 15px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>歡迎來到我的單頁式網站！</h1>
        <p>這是一個簡單的展示頁面，旨在說明如何透過 CDN 引入 CSS、JavaScript 和圖片資源，以實現一個美觀且功能完善的單頁式應用程式。</p>
        <p>我們使用了 Bootstrap 來快速建立響應式佈局，並透過 CDN 引入其樣式表和腳本。圖片也是直接從 CDN 取得。</p>
        <!-- 引入圖片 CDN -->
        <img src="https://picsum.photos/id/237/800/400" alt="隨機圖片">
        <p>希望您喜歡這個簡潔的範例！</p>
    </div>

    <!-- 引入 Popper.js 和 Bootstrap JS CDN (Bootstrap 需要 Popper.js) -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</body>
</html>
