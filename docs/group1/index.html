<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBM 形象輪播</title>
    <!-- 引入 Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            padding-top: 20px;
        }
        .container {
            max-width: 960px;
            margin-top: 30px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        h1, h2 {
            color: #1a004c; /* 深紫色，接近IBM藍的深色調 */
            text-align: center;
            margin-bottom: 25px;
        }
        .carousel-item img {
            height: 450px; /* 固定圖片高度 */
            object-fit: cover; /* 讓圖片填滿空間並裁剪 */
            width: 100%;
            border-radius: 8px;
        }
        .carousel-caption {
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 5px;
            padding: 10px 15px;
            bottom: 20px;
        }
        .carousel-caption h5 {
            color: #fff;
            font-size: 1.5rem;
        }
        .carousel-caption p {
            color: #eee;
            font-size: 1rem;
        }
        .footer-text {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>探索 IBM 的世界</h1>
        <h2 class="mb-4">創新、科技與未來</h2>

        <div id="ibmCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#ibmCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#ibmCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#ibmCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
                <button type="button" data-bs-target="#ibmCarousel" data-bs-slide-to="3" aria-label="Slide 4"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://images.unsplash.com/photo-1596701072551-bce0b5368a5c?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=1470&q=80" class="d-block w-100" alt="IBM Quantum Computing">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>量子運算</h5>
                        <p>IBM 在量子運算領域持續突破，引領下一代計算革命。</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://images.unsplash.com/photo-1521737711867-bb436a5f0884?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1470&q=80" class="d-block w-100" alt="IBM AI and Data">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>人工智慧與數據</h5>
                        <p>Watson 與 AI 技術，協助企業駕馭數據，做出更明智的決策。</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://images.unsplash.com/photo-1542831371-d60207865e23?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1470&q=80" class="d-block w-100" alt="IBM Cloud Solutions">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>雲端解決方案</h5>
                        <p>IBM 雲端提供企業級的混合雲架構，安全且富有彈性。</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1470&q=80" class="d-block w-100" alt="IBM Global Services">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>全球服務</h5>
                        <p>透過專業顧問與技術服務，IBM 助客戶實現數位轉型。</p>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#ibmCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">上一張</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#ibmCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">下一張</span>
            </button>
        </div>
        <p class="footer-text">
            此頁面僅為展示用，圖片來自 Unsplash，版權歸原作者所有。
        </p>
    </div>

    <!-- 引入 Bootstrap 5 JS CDN (包含 Popper.js) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
